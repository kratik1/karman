<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kármán 3D — volumetric GPU wind tunnel</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌀</text></svg>">
<style>
  :root {
    --accent: #3b5bdb;
    --bg: #edeae2;
    --text: #262b3a;
    --dim: #8b8574;
    --hairline: rgba(35, 30, 20, 0.12);
    --mono: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); }
  body {
    font: 13px/1.5 -apple-system, "SF Pro Text", "Segoe UI", system-ui, sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  #view { position: fixed; inset: 0; width: 100%; height: 100%; display: block; cursor: grab; touch-action: none; }
  #view:active { cursor: grabbing; }

  #panel {
    position: fixed; top: 18px; left: 18px; width: 250px;
    border-radius: 16px;
    background: linear-gradient(165deg, rgba(252, 250, 245, 0.90), rgba(243, 240, 231, 0.86));
    backdrop-filter: blur(20px) saturate(1.15);
    -webkit-backdrop-filter: blur(20px) saturate(1.15);
    border: 1px solid var(--hairline);
    box-shadow: 0 16px 44px rgba(60, 50, 28, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.65);
    padding: 15px 16px 14px;
    user-select: none;
  }
  #panel header { display: flex; align-items: baseline; justify-content: space-between; }
  #panel h1 { font: 600 15px/1 var(--mono); letter-spacing: 0.26em; color: #1a1e2c; }
  #panel h1 .caret { color: var(--accent); animation: blink 1.2s steps(1) infinite; }
  #panel h1 .threeD { color: var(--accent); letter-spacing: 0.1em; }
  @keyframes blink { 50% { opacity: 0; } }
  #collapse {
    border: 0; background: transparent; color: var(--dim); cursor: pointer;
    font-size: 11px; padding: 2px 4px; transition: transform 0.25s, color 0.15s;
  }
  #collapse:hover { color: var(--text); }
  #panel.collapsed #collapse { transform: rotate(-90deg); }
  #panel .sub { color: var(--dim); font: 400 10.5px/1 var(--mono); letter-spacing: 0.04em; margin: 6px 0 4px; }
  #panel.collapsed #panelBody, #panel.collapsed .sub { display: none; }

  .row { margin-top: 12px; }
  .row > label {
    display: flex; justify-content: space-between; align-items: baseline;
    color: var(--dim); font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 6px;
  }
  .row .val { font: 500 11px var(--mono); color: var(--text); text-transform: none; letter-spacing: 0; }

  select, input[type=text] {
    font: 500 12px var(--mono); color: var(--text);
    background: rgba(35, 30, 20, 0.05);
    border: 1px solid var(--hairline); border-radius: 8px;
    padding: 7px 9px; width: 100%; outline: none;
    appearance: none; -webkit-appearance: none;
  }
  select { background-image: linear-gradient(45deg, transparent 50%, var(--dim) 50%), linear-gradient(135deg, var(--dim) 50%, transparent 50%);
    background-position: calc(100% - 15px) 55%, calc(100% - 10px) 55%;
    background-size: 5px 5px; background-repeat: no-repeat; cursor: pointer; }
  select:hover, input[type=text]:hover { border-color: rgba(35, 30, 20, 0.28); }
  select:focus, input[type=text]:focus { border-color: color-mix(in srgb, var(--accent) 55%, transparent); }

  .seg {
    display: flex; gap: 3px; padding: 3px;
    background: rgba(35, 30, 20, 0.05);
    border: 1px solid var(--hairline); border-radius: 9px;
  }
  .seg button {
    flex: 1; border: 0; background: transparent; cursor: pointer;
    color: var(--dim); font: 500 11.5px/1 inherit;
    padding: 6px 0; border-radius: 6px;
    transition: color 0.15s, background 0.2s, box-shadow 0.2s;
  }
  .seg button:hover { color: var(--text); }
  .seg button.on {
    color: var(--accent);
    background: color-mix(in srgb, var(--accent) 13%, transparent);
    box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent) 32%, transparent);
  }

  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
    border-radius: 2px; outline: none; cursor: ew-resize;
    background: linear-gradient(to right,
      var(--accent) var(--fill, 50%), rgba(35, 30, 20, 0.15) var(--fill, 50%));
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
    background: #fff; border: 0;
    box-shadow: 0 0 0 3.5px color-mix(in srgb, var(--accent) 28%, transparent), 0 1px 4px rgba(0,0,0,0.5);
  }
  input[type=range]::-moz-range-thumb {
    width: 13px; height: 13px; border-radius: 50%; background: #fff; border: 0;
    box-shadow: 0 0 0 3.5px color-mix(in srgb, var(--accent) 28%, transparent);
  }

  .btns { display: flex; gap: 6px; margin-top: 14px; }
  .btns button, .btns a {
    flex: 1; font: 500 11.5px/1 inherit; color: var(--text); cursor: pointer;
    background: rgba(35, 30, 20, 0.05); text-align: center; text-decoration: none;
    border: 1px solid var(--hairline); border-radius: 8px; padding: 7px 0;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .btns button:hover, .btns a:hover {
    color: var(--accent);
    border-color: color-mix(in srgb, var(--accent) 40%, transparent);
    background: color-mix(in srgb, var(--accent) 7%, transparent);
  }

  .keys {
    margin-top: 13px; padding-top: 11px; border-top: 1px solid var(--hairline);
    color: var(--dim); font-size: 10px; line-height: 1.9;
  }
  .keys kbd {
    font: 500 9.5px var(--mono); color: var(--text);
    background: rgba(35, 30, 20, 0.07); border: 1px solid var(--hairline);
    border-radius: 4px; padding: 1px 4.5px; margin: 0 1px;
  }

  #hud {
    position: fixed; left: 18px; bottom: 16px;
    color: var(--dim); font: 400 10.5px var(--mono);
    background: rgba(252, 250, 245, 0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--hairline); border-radius: 99px;
    padding: 6px 13px;
    font-variant-numeric: tabular-nums;
  }
  #hud b { color: var(--text); font-weight: 500; }
  #hud i { font-style: normal; color: color-mix(in srgb, var(--accent) 60%, transparent); margin: 0 7px; }

  #toast {
    position: fixed; bottom: 20px; left: 50%;
    transform: translate(-50%, 16px);
    color: var(--text); font-size: 12px;
    background: rgba(252, 250, 245, 0.92);
    backdrop-filter: blur(16px);
    border: 1px solid var(--hairline); border-radius: 99px;
    padding: 9px 18px; opacity: 0; pointer-events: none;
    transition: opacity 0.5s, transform 0.5s;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translate(-50%, 0); }
  #toast kbd {
    font: 500 10px var(--mono); color: var(--accent);
    background: rgba(35, 30, 20, 0.07); border: 1px solid var(--hairline);
    border-radius: 4px; padding: 1px 5px;
  }

  #err {
    position: fixed; inset: 0; display: none; place-items: center; text-align: center;
    color: var(--text); padding: 40px; background: var(--bg); font-family: var(--mono);
  }

  body.hide-ui #panel, body.hide-ui #hud, body.hide-ui #toast { display: none; }

  @media (max-width: 560px) {
    #panel { left: 10px; right: 10px; top: 10px; width: auto; }
    #toast { display: none; }
  }
</style>
</head>
<body>
<canvas id="view"></canvas>

<div id="panel">
  <header>
    <h1>KÁRMÁN <span class="threeD">3D</span><span class="caret">_</span></h1>
    <button id="collapse" aria-label="Collapse panel">▼</button>
  </header>
  <div class="sub">volumetric lattice-Boltzmann · D3Q19</div>

  <div id="panelBody">
    <div class="row">
      <label>Scene</label>
      <select id="preset"></select>
    </div>

    <div class="row" id="textRow" hidden>
      <label>Obstacle text</label>
      <input type="text" id="obsText" maxlength="6" spellcheck="false" placeholder="short text…">
    </div>

    <div class="row">
      <label>Field</label>
      <div class="seg">
        <button data-mode="0">Smoke</button>
        <button data-mode="1">Vortex</button>
        <button data-mode="2">Speed</button>
        <button data-mode="3">Trace</button>
      </div>
    </div>

    <div class="row">
      <label>Tool</label>
      <div class="seg">
        <button data-tool="orbit">Orbit</button>
        <button data-tool="stir">Stir</button>
      </div>
    </div>

    <div class="row">
      <label>Inflow <span class="val" id="flowVal"></span></label>
      <input type="range" id="flow" min="0" max="0.12" step="0.005">
    </div>
    <div class="row">
      <label>Viscosity <span class="val" id="viscVal"></span></label>
      <input type="range" id="visc" min="0.505" max="0.62" step="0.002">
    </div>
    <div class="row">
      <label>Sim speed <span class="val" id="speedVal"></span></label>
      <input type="range" id="speed" min="1" max="8" step="1">
    </div>
    <div class="row">
      <label>Grid</label>
      <select id="quality">
        <option value="40">Fast · 80×40×40</option>
        <option value="56">Balanced · 112×56×56</option>
        <option value="72">Fine · 144×72×72</option>
      </select>
    </div>

    <div class="btns">
      <button id="pause">Pause</button>
      <button id="reset">Reset</button>
      <a href="../">2D ↗</a>
    </div>

    <div class="keys">
      drag <b>orbit</b> · wheel <b>zoom</b> · right-drag <b>pan</b><br>
      <kbd>1</kbd>–<kbd>4</kbd> field &nbsp; <kbd>o</kbd>/<kbd>s</kbd> orbit/stir &nbsp; <kbd>space</kbd> pause<br>
      <kbd>r</kbd> reset &nbsp; <kbd>h</kbd> hide ui
    </div>
  </div>
</div>

<div id="hud">…</div>
<div id="toast" class="show">drag to <b>orbit</b> &nbsp;·&nbsp; wheel to <b>zoom</b> &nbsp;·&nbsp; <kbd>s</kbd> then drag to <b>stir</b></div>
<div id="err"></div>

<script type="module">
  import('./src/main.js').catch((e) => {
    const el = document.getElementById('err');
    el.style.display = 'grid';
    el.textContent = 'Failed to start: ' + e.message;
    console.error(e);
  });
</script>
</body>
</html>
